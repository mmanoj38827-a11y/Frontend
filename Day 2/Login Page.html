<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#7775e3;
        }

        .login-box{
            width:300px;
            margin:100px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(104, 162, 249, 0.459);
        }

        h2{
            text-align:center;
            color:blue;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0 15px;
            border:1px solid #ccc;
            border-radius:15px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:rgb(28, 39, 165);
            color:white;
            border:none;
            border-radius:20px;
            cursor:pointer;
        }

        button:hover{
            background:rgb(60, 126, 231);
        }

        p{
            text-align:center;
        }

        a{
            text-decoration:none;
            color:blue;
        }
    </style>

</head>
<body>

<div class="login-box">

    <h2>Login</h2>

    <form>

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" placeholder="Enter your password">

        <button type="submit">Login</button>

    </form>

    <p>Don't have an account? <a href="#">Register</a></p>

</div>

</body>
</html>
