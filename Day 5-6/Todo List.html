<!DOCTYPE html>
<html>
    <head>
        <title>JavaScript DOM to-Do Apllication</title>
        <style>
            body{
                font-family:arial;
                width:350px;
                margin:100px auto;
            }
            input{
                width:220px;
                padding:8px;
            }
            button{
                padding:8px 12px;
            }
            li{
                margin:10px 0;
            }
            </style>
            </head>
            <body>
                <h2 id="heading">My To-Do Application</h2>
                <input type="text id="task" placeholder="enter task:">
                <button id="addBtn">Add task</button>
                <ul id="taskList"></ul>
                    <script>
                        const heading=document.getElementById("heading");
                        const taskInput=document.getElementById("task");
                        const addButton=document.getElementById("addBtn");
                        const taskList=document.getElementById("taskList");
                        addButton.addEventListener("click",addTask);
                        heading.addEventListener("mouseover",function(){heading.innerHTML="JavaScript DOM Manipulation"});
                        window.onload=function(){
                            let tasks=JSON.parse(localStorage.getItem("tasks")) || [];
                            tasks.forEach(function(task){
                            createTask(task);
                        });
                    };
                    function addTask(){
                        if(taskInput.value.trim)==""){
                            alert("Please enter a task.");
                            return;
                        }
                        createTask(taskInput.value);
                        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
                        tasks.push(taskInput.value);
                        localStorage.setItem("tasks",JSON.stringify(tasks));
                        taskInput.value="";
                    }
                    function create(task){
                        let li=document.createElement("li");
                        li.innerHTML=task+" ";
                        let removeBtn=document.createElement("button");
                        removeBtn.innerHTML="Delete";
                        remove.addEventListener("click",function(){
                            li.remove();
                            let tasks=JSON.parse(localStrorage.getItem("tasks")) || [];
                            tasks=tasks.filter(function(item){
                                return item !==task;
                            });
                            localStorage.setItem("tasks",JSON.stringify(tasks));
                        });
                        li.appendChild(removeBtn);
                        taskList.appendChild(li);
                    }
                    </script>
                    </body>
                    </html>
